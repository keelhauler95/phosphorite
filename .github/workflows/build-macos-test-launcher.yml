name: Build macOS Test Launcher

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (branch, tag, or SHA)"
        required: false
        default: "main"

permissions:
  contents: read

jobs:
  build-macos-test:
    runs-on: macos-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
            gm-client/package-lock.json
            player-client/package-lock.json
            launcher-app/package-lock.json

      - name: Install root dependencies
        run: npm install

      - name: Build and package launcher
        run: npm run dist

      - name: Upload macOS launcher artifact
        uses: actions/upload-artifact@v4
        with:
          name: phosphorite-launcher-macos-${{ github.run_number }}
          path: launcher-app/release/*.zip
          if-no-files-found: error
